<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東方停時譚 — 朗読プレイヤー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hiragino Mincho Pro', 'YuMincho', serif;
    background: #1a1a2e; color: #e0d8c8;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
  }
  header {
    padding: 16px 20px 8px;
    text-align: center;
  }
  header h1 {
    font-size: 1.2rem; font-weight: normal;
    color: #c4a882; letter-spacing: 0.05em;
  }
  header .sub {
    font-size: 0.75rem; color: #887a6a; margin-top: 2px;
  }
  .player-bar {
    padding: 12px 20px;
    background: linear-gradient(180deg, rgba(196,168,130,0.08), transparent);
  }
  .chapter-select {
    display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap;
  }
  .chapter-select button {
    flex: 1; min-width: 32px;
    padding: 6px 0; font-size: 0.7rem;
    border: 1px solid #3a3530; border-radius: 4px;
    background: transparent; color: #887a6a;
    cursor: pointer; font-family: inherit;
  }
  .chapter-select button.active {
    background: #3a3028; color: #c4a882; border-color: #6a5a4a;
  }
  .chapter-select button:disabled { opacity: 0.3; cursor: default; }
  .time-row {
    display: flex; align-items: center; gap: 10px;
  }
  .time { font-size: 0.7rem; color: #887a6a; min-width: 36px; }
  .time.right { text-align: right; }
  input[type=range] {
    flex: 1; -webkit-appearance: none; height: 3px;
    background: #3a3530; border-radius: 2px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: #c4a882; cursor: pointer;
  }
  .controls {
    display: flex; justify-content: center; gap: 16px; margin-top: 8px;
  }
  .controls button {
    font-size: 1.6rem; background: none; border: none;
    color: #c4a882; cursor: pointer; padding: 4px 12px;
  }
  .lyrics-container {
    flex: 1; overflow-y: auto; padding: 8px 20px 40px;
    -webkit-overflow-scrolling: touch;
  }
  .lyric-line {
    padding: 10px 12px; border-radius: 4px;
    font-size: 0.95rem; line-height: 1.7;
    color: #6a6058; transition: color 0.3s, background 0.3s;
    cursor: pointer;
  }
  .lyric-line.current {
    color: #f0e0c0; background: rgba(196,168,130,0.12);
  }
  .lyric-line.heading {
    color: #c4a882; font-size: 1.05rem; font-weight: bold;
    padding-top: 16px;
  }
  .lyric-line.heading:first-child { padding-top: 10px; }
  footer {
    text-align: center; padding: 12px;
    font-size: 0.65rem; color: #4a4540;
  }
</style>
</head>
<body>

<header>
  <h1>東方停時譚</h1>
  <div class="sub">LRC同期朗読プレイヤー</div>
</header>

<div class="player-bar">
  <div class="chapter-select" id="chapterButtons"></div>
  <div class="time-row">
    <span class="time" id="currentTime">0:00</span>
    <input type="range" id="seekBar" value="0" min="0" max="100">
    <span class="time right" id="totalTime">0:00</span>
  </div>
  <div class="controls">
    <button id="rewindBtn" title="10秒戻る">↺</button>
    <button id="playBtn" title="再生/停止">▶</button>
    <button id="fwdBtn" title="10秒進む">↻</button>
  </div>
</div>

<div class="lyrics-container" id="lyrics">
  <div class="lyric-line" style="color:#887a6a">読み込み中...</div>
</div>

<footer>Powered by GitHub Pages</footer>

<script>
const CHAPTERS = [
  { id: '01', title: '第1章：開かない賽銭箱' },
  { id: '02', title: '第2章：時が止まった洋館' },
];

const AUDIO_BASE = 'audio';

let audio = new Audio();
let lrcData = [];       // [{startSec, text, isHeading}]
let currentChapter = null;
let currentIndex = -1;
let isPlaying = false;

const $ = id => document.getElementById(id);
const lyricsEl = $('lyrics');
const playBtn = $('playBtn');
const seekBar = $('seekBar');
const curTimeEl = $('currentTime');
const totalTimeEl = $('totalTime');

// ── Chapter buttons ──
function buildChapterButtons() {
  const container = $('chapterButtons');
  CHAPTERS.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.textContent = ch.id;
    btn.title = ch.title;
    btn.onclick = () => loadChapter(i);
    container.appendChild(btn);
  });
}

// ── Load chapter ──
async function loadChapter(index) {
  const ch = CHAPTERS[index];
  if (currentChapter === ch.id) return;
  currentChapter = ch.id;

  // Update buttons
  document.querySelectorAll('.chapter-select button').forEach((b, i) => {
    b.classList.toggle('active', i === index);
  });

  // Load LRC
  const lrcUrl = `${AUDIO_BASE}/chapter-${ch.id}/chapter-${ch.id}_bgm.lrc`;
  try {
    const res = await fetch(lrcUrl);
    const text = await res.text();
    lrcData = parseLRC(text);
  } catch (e) {
    lrcData = [{ startSec: 0, text: 'LRCファイルが見つかりません', isHeading: false }];
  }

  // Load audio
  const mp3Url = `${AUDIO_BASE}/chapter-${ch.id}/chapter-${ch.id}_bgm.mp3`;
  audio.src = mp3Url;
  audio.load();
  renderLyrics();
  updatePlayBtn(false);
}

// ── Parse LRC ──
function parseLRC(text) {
  const lines = text.split('\n');
  const entries = [];
  for (const line of lines) {
    const m = line.match(/^\[(\d+):(\d+\.\d+)\](.*)/);
    if (m) {
      const sec = parseInt(m[1]) * 60 + parseFloat(m[2]);
      const txt = m[3].trim();
      if (txt) {
        entries.push({
          startSec: sec,
          text: txt,
          isHeading: txt.startsWith('第') && txt.includes('章')
        });
      }
    }
  }
  return entries;
}

// ── Render lyrics list ──
function renderLyrics() {
  lyricsEl.innerHTML = '';
  lrcData.forEach((entry, i) => {
    const div = document.createElement('div');
    div.className = 'lyric-line' + (entry.isHeading ? ' heading' : '');
    div.textContent = entry.text;
    div.dataset.index = i;
    div.onclick = () => seekTo(entry.startSec);
    lyricsEl.appendChild(div);
  });
}

// ── Find current lyric index ──
function findCurrentIndex(currentSec) {
  for (let i = lrcData.length - 1; i >= 0; i--) {
    if (lrcData[i].startSec <= currentSec) return i;
  }
  return 0;
}

// ── Highlight current line ──
function updateHighlight() {
  const idx = findCurrentIndex(audio.currentTime);
  if (idx === currentIndex) return;
  currentIndex = idx;

  const lines = lyricsEl.children;
  for (let i = 0; i < lines.length; i++) {
    lines[i].classList.toggle('current', i === idx);
  }

  // Auto-scroll
  if (lines[idx]) {
    lines[idx].scrollIntoView({ block: 'center', behavior: 'smooth' });
  }
}

// ── Time formatting ──
function fmtTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ── Seek ──
function seekTo(sec) {
  audio.currentTime = sec;
  if (!isPlaying) {
    audio.play().catch(() => {});
  }
}

// ── Playback controls ──
function updatePlayBtn(playing) {
  isPlaying = playing;
  playBtn.textContent = playing ? '⏸' : '▶';
}

playBtn.onclick = () => {
  if (isPlaying) {
    audio.pause();
  } else {
    audio.play().catch(() => {});
  }
};

$('rewindBtn').onclick = () => { audio.currentTime = Math.max(0, audio.currentTime - 10); };
$('fwdBtn').onclick = () => { audio.currentTime = Math.min(audio.duration || Infinity, audio.currentTime + 10); };

// ── Audio events ──
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  seekBar.value = pct;
  curTimeEl.textContent = fmtTime(audio.currentTime);
  updateHighlight();
});

audio.addEventListener('loadedmetadata', () => {
  totalTimeEl.textContent = fmtTime(audio.duration);
  seekBar.max = 100;
});

audio.addEventListener('play', () => updatePlayBtn(true));
audio.addEventListener('pause', () => updatePlayBtn(false));
audio.addEventListener('ended', () => updatePlayBtn(false));

// ── Seek bar ──
seekBar.addEventListener('input', () => {
  if (!audio.duration) return;
  audio.currentTime = (seekBar.value / 100) * audio.duration;
});

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); playBtn.click(); }
  if (e.code === 'ArrowLeft') { audio.currentTime = Math.max(0, audio.currentTime - 5); }
  if (e.code === 'ArrowRight') { audio.currentTime = Math.min(audio.duration || Infinity, audio.currentTime + 5); }
});

// ── Init ──
buildChapterButtons();
loadChapter(0);
</script>
</body>
</html>
